[hotkeys]
menuhotkey="!c"
exithotkey="+!c"

[timing]
hintTimeShort=1500
hintTimeMedium=2000
hintTime=3000
hintTimeLong=20000

[config]
font="Segoe UI"
fontsize=9
sessionfiles="C:\___jvr_work\npp-sessions\"
sessionfileExtension=".npp-session"

[external]
notepadppPath="C:\Program Files\Notepad++\notepad++.exe"
runnerPath=[...]\UnicodeTable.ahk

[fastSwitchCycle]
fastSwitchAutoCycleHotkey="!q"
fastSwitchUseTitle="ConsoleWindowClass"

[openSessionTiming]
waitForNotepadReady=500
waitForSessionManagerLoop=1000
waitForEditReady=500
waitDokListOpenLoop=500

[gui]
dpiScale=96
windowPosX=3
windowPosY=6
clientWidth=1276
clientHeight=700
currentSelected=06
